career-profile:
    title: Career Profile
    summary: |
      I am an experienced software engineer and programming enthusiast with a wealth of experience in developing both low- and high-level software applications.
      Currently, I specialize in Go, containerized microservices, scalable architectures, event-driven systems, DDD, and cloud technologies. Recently, I have focused heavily on building open-source developer tooling and the practical business applications of modern, multi-model AI orchestration solutions.
