experiences:
    title: Experiences
    info:
      - role: Software Engineer
        time: September 2025 - Present
        company: Cast AI
        details: |
          Contributing across the entire product lifecycle, including product discovery, solution design, backend development, testing, and production deployment for cutting-edge AI infrastructure.
          Core contributor to **Kimchi.dev**, an open-source terminal coding agent CLI and multi-model AI orchestration/inference platform. Designing and developing high-performance terminal workflows, session management systems, and intelligent multi-model routing engines.
          Designing and implementing distributed, event-driven microservices for the AI Enabler platform, providing scalable services for multi-cloud OSS LLM routing, self-hosted deployments, and automated cloud cost optimization.
          Building high-performance backend services in Go tightly integrated with Kubernetes, PostgreSQL, OTLP telemetry/observability stacks, and cloud-native tooling across AWS, GCP, and Azure.

      - role: Software Engineer
        time: May 2018 - Present
        company: Self-Employed [B2B]
        details: |
          Worked as a senior contractor and Tech Lead on multiple cloud-scale software projects, delivering high-availability solutions:
            *  Designing and developing production-ready applications based on containerized, event-driven microservices built for high-throughput cloud scalability.
            *  Collaborating closely with product stakeholders to translate abstract business goals into effective, adequate, and problem-oriented technical designs.
            *  Leading engineering initiatives with a strict focus on Clean Architecture, Domain-Driven Design (DDD), and automated testing.
            *  Fostering a healthy engineering culture centered on open communication, continuous code quality, and psychological safety.
            *  Actively contributing to open-source software and tools.
          
          Technologies: **Go**, **Microservices**, **Event-Driven**, **Eventsourcing**, **Cloud**, **Docker**, **GCP**, **Firestore**, **PostgreSQL**, **NoSQL**, and more... 
      - role: Software Developer Lead
        time: January 2016 - May 2018
        company: UBS
        details: |
          Responsible for the architectural design, implementation, testing, maintenance, and automated deployment of high-compliance internal enterprise applications. 
          Served as the technical leader of the development team and Scrum Master, driving engineering excellence and agile delivery.

          Technologies: **Java**, **Spring Framework**, **JS**, **AngularJS**, **Apache Solr**, **Oracle DB**, **Jenkins**, **Tomcat**
      - role: Software Developer
        time: December 2014 - January 2016
        company: Comarch
        details: |
          Responsible for the full-cycle implementation, automated testing, and zero-downtime deployment of new features for a high-scale, cloud-based backup and file synchronization service.

          Technologies: **Java**, **Spring Framework**, **C#**, **.NET 3.5+**, **PostgreSQL**, **MongoDB**
      - role: Lead Industrial Automation Software Engineer
        time: June 2013 - December 2014
        company: teamtechnik Group
        details: |
          Led the implementation, testing, deployment, and on-site commissioning of full-stack mission-critical software systems (spanning low-level real-time automation to high-level auxiliary applications) for automotive assembly lines.
          Responsible for the technical leadership and execution management of project-oriented international engineering teams. 
          Successfully delivered high-budget projects across Poland, China, and Germany.

          Technologies: **C#**, **.NET 3.5+**, **Oracle DB**, **Siemens Simatic S7**
      - role: Industrial Automation Software Engineer
        time: April 2013 - June 2013
        company: teamtechnik Group
        details: |
          Responsible for the implementation, rigorous testing, and commissioning of low-level, real-time automation software architectures for automotive testing and assembly infrastructure.
      - role: Industrial Automation Software Engineer
        time: March 2012 – April 2013
        company: Siemens
        details: |
          Responsible for software development, robust integration testing, and on-site commissioning of industrial automation systems controlling high-temperature hot steel rolling mills. 
          Successfully deployed multi-million dollar engineering projects in Poland, Germany, and Turkey.
